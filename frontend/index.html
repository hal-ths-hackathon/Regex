<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Regex Game - Frontend</title>
  </head>
  <body>
    <h1>Regex Game</h1>
    <p>This is a minimal frontend placeholder. It will call the backend mock API.</p>
    <pre id="resp"></pre>
    <script>
      fetch('http://localhost:8000/api/v1/stages/generate?level=hard')
        .then(r => r.json())
        .then(j => { document.getElementById('resp').textContent = JSON.stringify(j, null, 2) })
        .catch(e => { document.getElementById('resp').textContent = String(e) })
    </script>
  </body>
</html>
